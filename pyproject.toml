[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "supermedicine"
version = "0.1.0"
description = "Modular medical research Agent with RAG and Harness"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]
r = [
    "rpy2>=3.5",
]

[tool.setuptools.packages.find]
include = ["core*", "permission*", "agents*", "plugins*", "adapters*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
