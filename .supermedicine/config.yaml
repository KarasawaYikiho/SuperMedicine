# SuperMedicine 配置
# LLM provider defaults. API keys may be injected into a local project
# file by Install.py or loaded from environment variables. Do not commit
# real secrets from local workspaces.
project_name: supermedicine
version: Beta0.3.0
llm:
  provider: openai
  providers:
    openai:
      api_format: openai
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      model: gpt-4o-mini
      timeout: 60
      headers: {}
    anthropic:
      api_format: anthropic
      base_url: https://api.anthropic.com/v1
      api_key_env: ANTHROPIC_API_KEY
      model: claude-3-5-sonnet-latest
      timeout: 60
      headers: {}
