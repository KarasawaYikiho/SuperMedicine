# SuperMedicine 配置
# LLM provider template. Repository defaults intentionally keep API
# provider, BaseURL, model, and key values empty. Install.py must be
# supplied complete local LLM settings before first startup.
project_name: supermedicine
version: Beta0.3.5
llm:
  provider: ''
  providers:
    openai:
      api_format: openai
      base_url: ''
      api_key_env: OPENAI_API_KEY
      model: ''
      timeout: 60
      headers: {}
    anthropic:
      api_format: anthropic
      base_url: ''
      api_key_env: ANTHROPIC_API_KEY
      model: ''
      timeout: 60
      headers: {}
