name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: Release gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Bun for bridge integration tests
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip cache purge; if (-not $?) { Write-Warning "pip cache purge failed; continuing" }
          # Cache-busting: force fresh install (timestamp: $(Get-Date -Format 'yyyyMMddHHmmss'))
          python -m pip install -e ".[dev]" --no-cache-dir

      - name: Ruff lint
        shell: pwsh
        run: python -m ruff check --select=E,F,W --ignore=E501 .

      - name: Type check
        shell: pwsh
        run: python -m mypy . --cache-dir (Join-Path $env:RUNNER_TEMP "mypy-cache")

      - name: Repository hygiene checks
        shell: pwsh
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest-repo-hygiene"
          python -m pytest tests/test_repo_hygiene.py -q --override-ini addopts= -p no:cacheprovider --basetemp $pytestTemp

      - name: Test suite
        shell: pwsh
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest-full-suite"
          python -m pytest tests/ -v --tb=short --override-ini addopts= -p no:cacheprovider --basetemp $pytestTemp

      - name: Wheel smoke
        shell: pwsh
        run: |
          python -m build --wheel --outdir wheelhouse
          $wheel = (Get-ChildItem -LiteralPath wheelhouse -Filter *.whl | Select-Object -First 1).FullName
          python -m pip install $wheel --no-deps --target wheel-smoke
          python scripts/ci/smoke_wheel_install.py wheel-smoke
          Remove-Item -LiteralPath "wheel-smoke" -Recurse -Force
          Remove-Item -LiteralPath "wheelhouse" -Recurse -Force

  packaging-smoke:
    name: Source distribution smoke
    needs: release-gate
    runs-on: windows-latest
    outputs:
      release_label: ${{ steps.source_zip.outputs.release_label }}
      release_title: ${{ steps.source_zip.outputs.release_title }}
      archive_name: ${{ steps.source_zip.outputs.archive_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js for OpenTUI dependency install
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Bun for OpenTUI runtime smoke prerequisites
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip cache purge || true
          python -m pip install -e . build pyinstaller
          npm ci
          bun --version
          npm run opentui:smoke

      - name: Build sdist for validation only
        shell: bash
        run: |
          python -m build --sdist --outdir dist
          rm -rf dist

      - name: Build release application Exe artifact
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ci/_pyinstaller_builder.py application
          test -f dist/SuperMedicine.exe
          ./dist/SuperMedicine.exe tui --dry-run
          python install_entry.py --release-exe dist/SuperMedicine.exe --desktop-dir "$RUNNER_TEMP/Desktop" --exe-dry-run

      - name: Build GUI standalone Exe artifact
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ci/build_gui_exe.py
          test -f dist/SuperMedicineGUI.exe
          ./dist/SuperMedicineGUI.exe --self-test

      - name: Build standalone installer Exe artifact
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ci/build_installer_exe.py
          test -f dist/SuperMedicineInstaller.exe
          ./dist/SuperMedicineInstaller.exe --self-test

      - name: Build release Zip
        id: source_zip
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ci/build_release_zip.py

      - name: Self-test GUI from release Zip
        shell: pwsh
        run: |
          $archive = Get-ChildItem -LiteralPath . -Filter "SuperMedicine v*.zip" | Select-Object -First 1
          if (-not $archive) { throw "Release Zip was not created" }
          $extractRoot = Join-Path $env:RUNNER_TEMP "supermedicine-release"
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $extractRoot
          $gui = Get-ChildItem -LiteralPath $extractRoot -Recurse -Filter SuperMedicineGUI.exe | Select-Object -First 1
          if (-not $gui) { throw "GUI EXE missing from release Zip" }
          $report = Join-Path $env:RUNNER_TEMP "zip-gui-self-test.json"
          & $gui.FullName --self-test --self-test-report $report
          if ($LASTEXITCODE -ne 0) { throw "Extracted GUI self-test failed" }
          $result = Get-Content -LiteralPath $report -Raw | ConvertFrom-Json
          if (-not $result.ok) { throw ($result | ConvertTo-Json -Depth 8) }

      - name: Upload release Zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.source_zip.outputs.release_label }}
          path: ${{ steps.source_zip.outputs.archive_name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: packaging-smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.packaging-smoke.outputs.release_label }}
      RELEASE_TITLE: ${{ needs.packaging-smoke.outputs.release_title }}
      ARCHIVE_NAME: ${{ needs.packaging-smoke.outputs.archive_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release Zip artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.packaging-smoke.outputs.release_label }}
          path: release-artifacts

      - name: Generate release body from git history
        shell: bash
        run: |
          set -euo pipefail

          previous_tag=""
          while IFS= read -r candidate; do
            if [[ "$candidate" != "$RELEASE_TAG" ]]; then
              previous_tag="$candidate"
              break
            fi
          done < <(git tag --list 'v*' --sort=-v:refname)

          {
            echo "## Changes"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since $previous_tag:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" || true
            else
              echo "No previous version tag was found; summarizing available history:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' --max-count=30 || true
            fi
            echo
          } > release-body.md

          if ! grep -q '^- ' release-body.md; then
            cat > release-body.md <<'EOF'
          ## Changes

          No commit summary was available for this release.
          EOF
          fi

      - name: Verify immutable tag and publish release assets
        shell: bash
        run: |
          set -euo pipefail

          asset_path="release-artifacts/${ARCHIVE_NAME}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release title: ${RELEASE_TITLE}"
          echo "Archive name: ${ARCHIVE_NAME}"
          echo "Asset path: ${asset_path}"

          if [[ ! -f "$asset_path" ]]; then
            echo "ERROR: Release asset file does not exist: ${asset_path}" >&2
            exit 1
          fi

          git fetch --tags
          if [[ "$GITHUB_REF_TYPE" != "tag" || "$GITHUB_REF_NAME" != "$RELEASE_TAG" ]]; then
            echo "ERROR: Workflow tag ${GITHUB_REF_NAME} does not match release ${RELEASE_TAG}." >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
            echo "ERROR: Tag commit ${tag_commit} does not match build commit ${GITHUB_SHA}." >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "ERROR: Release already exists for ${RELEASE_TAG}; refusing to overwrite it." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-body.md --target "$GITHUB_SHA"

          checksum_path="${asset_path}.sha256"
          sha256sum "$asset_path" > "$checksum_path"
          echo "Uploading release asset '${asset_path}' to ${RELEASE_TAG}..."
          if ! gh release upload "$RELEASE_TAG" "$asset_path" "$checksum_path"; then
            echo "ERROR: Failed to upload release asset '${asset_path}' to ${RELEASE_TAG}." >&2
            exit 1
          fi
          echo "Release asset upload completed: ${asset_path}"
