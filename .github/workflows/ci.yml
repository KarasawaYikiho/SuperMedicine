name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: Release gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip cache purge; if (-not $?) { Write-Warning "pip cache purge failed; continuing" }
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        shell: pwsh
        run: python -m ruff check --select=E,F,W --ignore=E501 .

      - name: Type check
        shell: pwsh
        run: python -m mypy . --cache-dir (Join-Path $env:RUNNER_TEMP "mypy-cache")

      - name: Repository hygiene checks
        shell: pwsh
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest-repo-hygiene"
          python -m pytest tests/test_repo_hygiene.py -q --override-ini addopts= -p no:cacheprovider --basetemp $pytestTemp

      - name: Test suite
        shell: pwsh
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest-full-suite"
          python -m pytest tests/ -v --tb=short --override-ini addopts= -p no:cacheprovider --basetemp $pytestTemp

      - name: Wheel smoke
        shell: pwsh
        run: |
          python -m pip wheel . --no-deps --wheel-dir wheelhouse
          Remove-Item -LiteralPath "wheelhouse" -Recurse -Force

  packaging-smoke:
    name: Source distribution smoke
    needs: release-gate
    runs-on: ubuntu-latest
    outputs:
      release_label: ${{ steps.source_zip.outputs.release_label }}
      release_title: ${{ steps.source_zip.outputs.release_title }}
      archive_name: ${{ steps.source_zip.outputs.archive_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip cache purge || true
          python -m pip install build

      - name: Build sdist for validation only
        shell: bash
        run: |
          python -m build --sdist --outdir dist
          rm -rf dist

      - name: Build release Zip
        id: source_zip
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import shutil
          import tomllib
          import zipfile

          root = Path.cwd()
          version = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          beta_match = re.fullmatch(r"(\d+\.\d+\.\d+)b\d+", version)
          release_version = beta_match.group(1) if beta_match else version
          release_label = f"Beta{release_version}" if beta_match else f"v{release_version}"
          release_title = f"Beta {release_version}" if beta_match else f"v{release_version}"
          archive_name = f"SuperMedicine {release_label}.zip"
          stage = root / ".release-zip-stage" / f"SuperMedicine {release_label}"

          include_files = [
              "Cli.py",
              "Install.py",
              "Uninstall.py",
              "pyproject.toml",
              "requirements.txt",
              "install.json",
              "LICENSE",
              "README.md",
              "CHANGELOG.md",
              "CONTRIBUTING.md",
              "SECURITY.md",
              "INSTALL.md",
          ]
          include_dirs = ["core", "permission", "agents", "plugins", "adapters", "installer"]
          excluded_dir_names = {
              "__pycache__",
              ".pytest_cache",
              ".ruff_cache",
              ".mypy_cache",
              ".pytest-tmp",
              ".pytest_tmp",
          }
          excluded_file_names = {".env"}
          excluded_suffixes = {".pyc", ".pyo", ".tmp", ".token"}

          def should_exclude(path: Path) -> bool:
              parts = set(path.parts)
              if parts & excluded_dir_names:
                  return True
              if path.name in excluded_file_names:
                  return True
              if path.suffix in excluded_suffixes:
                  return True
              if path.name.endswith("~") or path.name.endswith(".log"):
                  return True
              return False

          if stage.parent.exists():
              shutil.rmtree(stage.parent)
          stage.mkdir(parents=True)

          for relative in include_files:
              source = root / relative
              if source.exists() and not should_exclude(Path(relative)):
                  target = stage / relative
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)

          for relative_dir in include_dirs:
              source_dir = root / relative_dir
              if not source_dir.exists():
                  continue
              for source in source_dir.rglob("*"):
                  relative = source.relative_to(root)
                  if should_exclude(relative):
                      continue
                  target = stage / relative
                  if source.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                  else:
                      target.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copy2(source, target)

          archive_path = root / archive_name
          if archive_path.exists():
              archive_path.unlink()
          with zipfile.ZipFile(archive_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for source in sorted(stage.rglob("*")):
                  if source.is_file():
                      archive.write(source, source.relative_to(stage.parent).as_posix())

          shutil.rmtree(stage.parent)
          print(f"Created {archive_name}")
          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write(f"release_label={release_label}\n")
                  output.write(f"release_title={release_title}\n")
                  output.write(f"archive_name={archive_name}\n")
          PY

      - name: Upload release Zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.source_zip.outputs.release_label }}
          path: ${{ steps.source_zip.outputs.archive_name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: packaging-smoke
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' ||
       github.ref == 'refs/heads/master' ||
       github.ref == 'refs/heads/main')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.packaging-smoke.outputs.release_label }}
      RELEASE_TITLE: ${{ needs.packaging-smoke.outputs.release_title }}
      ARCHIVE_NAME: ${{ needs.packaging-smoke.outputs.archive_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release Zip artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.packaging-smoke.outputs.release_label }}
          path: release-artifacts

      - name: Generate release body from git history
        shell: bash
        run: |
          set -euo pipefail

          previous_tag=""
          while IFS= read -r candidate; do
            if [[ "$candidate" != "$RELEASE_TAG" ]]; then
              previous_tag="$candidate"
              break
            fi
          done < <(git tag --list 'Beta*' --sort=-v:refname)

          {
            echo "## Changes"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since $previous_tag:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" || true
            else
              echo "No previous Beta tag was found; summarizing available history:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' --max-count=30 || true
            fi
            echo
          } > release-body.md

          if ! grep -q '^- ' release-body.md; then
            cat > release-body.md <<'EOF'
          ## Changes

          No commit summary was available for this release.
          EOF
          fi

      - name: Create or update tag, release, and Zip asset
        shell: bash
        run: |
          set -euo pipefail

          asset_path="release-artifacts/${ARCHIVE_NAME}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release title: ${RELEASE_TITLE}"
          echo "Archive name: ${ARCHIVE_NAME}"
          echo "Asset path: ${asset_path}"

          if [[ ! -f "$asset_path" ]]; then
            echo "ERROR: Release asset file does not exist: ${asset_path}" >&2
            exit 1
          fi

          git fetch --tags
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists; leaving it unchanged."
          else
            git tag "$RELEASE_TAG" "$GITHUB_SHA"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-body.md --target "$GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file release-body.md --target "$GITHUB_SHA"
          fi

          upload_asset_name="${ARCHIVE_NAME// /.}"
          echo "Checking for existing release assets named '${ARCHIVE_NAME}' or '${upload_asset_name}'..."
          existing_asset_names=$(gh release view "$RELEASE_TAG" --json assets --jq ".assets[] | select(.name == \"${ARCHIVE_NAME}\" or .name == \"${upload_asset_name}\") | .name")
          if [[ -n "$existing_asset_names" ]]; then
            while IFS= read -r asset_name; do
              if [[ -n "$asset_name" ]]; then
                echo "Deleting existing release asset by name: ${asset_name}"
                if ! gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes; then
                  echo "ERROR: Failed to delete existing release asset '${asset_name}' for ${RELEASE_TAG}." >&2
                  exit 1
                fi
              fi
            done <<< "$existing_asset_names"
          else
            echo "No existing release assets found for '${ARCHIVE_NAME}' or '${upload_asset_name}'."
          fi

          echo "Uploading release asset '${asset_path}' to ${RELEASE_TAG}..."
          if ! gh release upload "$RELEASE_TAG" "$asset_path" --clobber; then
            echo "ERROR: Failed to upload release asset '${asset_path}' to ${RELEASE_TAG}." >&2
            exit 1
          fi
          echo "Release asset upload completed: ${asset_path}"
