name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  release-gate:
    name: Release gate (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip cache purge
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        shell: pwsh
        run: python -m ruff check --select=E,F,W --ignore=E501 .

      - name: Repository hygiene checks
        shell: pwsh
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest-repo-hygiene"
          python -m pytest tests/test_repo_hygiene.py -q --override-ini addopts= -p no:cacheprovider --basetemp $pytestTemp

      - name: Test suite
        shell: pwsh
        run: |
          $pytestTemp = Join-Path $env:RUNNER_TEMP "pytest-full-suite"
          python -m pytest tests/ -v --tb=short --override-ini addopts= -p no:cacheprovider --basetemp $pytestTemp

      - name: Wheel smoke
        shell: pwsh
        run: |
          python -m pip wheel . --no-deps --wheel-dir wheelhouse
          Remove-Item -LiteralPath "wheelhouse" -Recurse -Force

  packaging-smoke:
    name: Source distribution smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip cache purge
          python -m pip install build

      - name: Build sdist for validation only
        shell: bash
        run: |
          python -m build --sdist --outdir dist
          rm -rf dist
