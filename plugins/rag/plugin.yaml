name: "rag-interface"
version: "0.1.0"
type: "rag"
language: "python"
entry: "main.py"
description: "RAG 检索接口（支持本地确定性 Provider 与受权限约束的外部 Provider）"
provides:
  - id: "rag.query"
    description: "Query the configured RAG provider"
  - id: "rag.context.store"
    description: "Store RAG context by key"
  - id: "rag.context.retrieve"
    description: "Retrieve RAG context by key"
provider:
  type: "local"
  api_endpoint: ""
  api_key_env: ""
  embedding_model: ""
  vector_store: ""
