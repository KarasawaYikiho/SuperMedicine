id: "python-data-analysis"
language: "python"
name: "Python mainstream data analysis algorithms"
description: "Lightweight Python data-analysis toolkit covering descriptive statistics, missing-value summaries, scaling, correlation, regression, PCA, clustering, tree/boosting optional wrappers, time-series basics, and hypothesis tests. Heavy ML libraries are treated as optional runtime capabilities."
entrypoint: "runner.py"
dependencies: []
inputs:
  - name: "input"
    description: "Optional CSV/TSV data table. If omitted, the runner uses a small built-in sample for smoke execution."
    type: "path:csv_or_tsv"
    required: false
  - name: "tool-kind"
    description: "Algorithm action: descriptive, missing, scale, correlation, linear-regression, logistic-regression, pca, kmeans, hierarchical-clustering, random-forest, gradient-boosting, time-series, t-test, chi-square, anova, or all-light."
    type: "string"
    required: false
  - name: "columns"
    description: "Comma-separated numeric columns to analyze; defaults to detected numeric columns."
    type: "string"
    required: false
outputs:
  - name: "output"
    description: "JSON analysis result path. If omitted, JSON is printed to stdout."
    type: "path:json"
    required: false
version: "1.0.0"
