id: "r-heatmap"
language: "r"
name: "R heatmap"
description: "Optional R heatmap visualization tool using pheatmap and ggplot2. Generates clustered heatmaps from CSV/TSV data matrices."
entrypoint: "runner.R"
dependencies:
  - "ggplot2"
  - "readr"
  - "pheatmap"
inputs:
  - name: "input"
    description: "CSV/TSV data matrix path. If omitted, a small built-in sample is used."
    type: "path:csv_or_tsv"
    required: false
  - name: "tool-kind"
    description: "Visualization kind: heatmap"
    type: "string"
    required: false
outputs:
  - name: "output"
    description: "Output image path (PNG). If omitted, result summary is printed to stdout."
    type: "path:png"
    required: false
version: "1.0.0"
