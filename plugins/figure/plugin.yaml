name: "figure"
version: "1.0.0"
type: "tool"
language: "python"
description: "Scientific figure visualization advisor: data profiling, journal style presets, multi-format export, compliance audit, panel alignment, visual QA, and full 8-step workflow"
provides:
  - id: "figure.workflow"
    description: "Full 8-step figure workflow: understand→profile→select→spec→style→plot→check→export"
  - id: "figure-profile.profile"
    description: "Data profiling and chart suggestion report"
  - id: "figure-style.setup"
    description: "Apply journal style preset"
  - id: "figure-style.list-fonts"
    description: "List available CJK fonts"
  - id: "figure-export.export"
    description: "Export figure to specified formats"
  - id: "figure-check.audit"
    description: "Audit figure file for publication compliance"
  - id: "figure-layout.labels"
    description: "Add aligned panel labels"
  - id: "figure-layout.finalize"
    description: "Finalize figure layout"
  - id: "figure-qa.audit"
    description: "Audit figure layout for rendering issues"
  - id: "figure-qa.preview"
    description: "Render PNG preview for visual inspection"
entry: "runner.py"
