name: "harness-core"
version: "0.1.0"
type: "harness"
required: true
disable_supported: false
language: "python"
entry: "main.py"
description: "测试评估与 Agent 监控框架"
provides:
  - id: "harness.runtime.health"
    description: "Report mandatory Harness runtime health"
  - id: "harness.integration.checkpoint"
    description: "验证检查点完整性"
  - id: "harness.integration.checkpoint_all"
    description: "验证所有检查点"
  - id: "harness.monitor.permission_audit"
    description: "读取权限审计日志"
  - id: "harness.monitor.denied_actions"
    description: "读取被拒绝的权限动作"
  - id: "harness.monitor.anomaly"
    description: "检测权限审计高频异常"
  - id: "harness.monitor.performance"
    description: "读取 Agent 性能统计"
  - id: "harness.monitor.failure_patterns"
    description: "检测连续失败模式"
